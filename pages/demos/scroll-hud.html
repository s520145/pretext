<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

<body>

    * { margin: 0; padding: 0; box-sizing: border-box; }

      background: linear-gradient(#f8f8f8, #ececec);

      line-height: 16px;
      color: #444;
      pointer-events: none;
